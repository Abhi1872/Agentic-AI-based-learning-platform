{% extends "base.html" %}

{% block title %}Parent Login - Agentic{% endblock %}

{% block content %}
<div class="login-page">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100 py-5">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <div class="text-center mb-5">
                    <div class="brand-logo mb-4">
                        <div class="bg-warning bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                            <i data-feather="users" class="text-warning" style="width: 40px; height: 40px;"></i>
                        </div>
                    </div>
                    <h1 class="display-5 fw-bold text-warning">Parent Portal</h1>
                    <p class="text-muted">View your child's learning progress</p>
                </div>
                
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <h2 class="h4 text-center mb-4">Parent Login</h2>
                        
                        <form method="POST" action="{{ url_for('parent_login') }}">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            
                            <div class="mb-4">
                                <label for="parent_id" class="form-label fw-semibold">Parent ID</label>
                                <input type="text" class="form-control form-control-lg" id="parent_id" name="parent_id" 
                                       placeholder="e.g., PARENT001">
                            </div>
                            
                            <div class="mb-4">
                                <label for="access_token" class="form-label fw-semibold">Or Access Token</label>
                                <input type="text" class="form-control form-control-lg" id="access_token" name="access_token" 
                                       placeholder="Enter your access token">
                                <small class="text-muted">You can use either Parent ID or Access Token</small>
                            </div>
                            
                            <button type="submit" class="btn btn-warning btn-lg w-100 mb-3 text-dark">
                                <i data-feather="log-in" aria-hidden="true"></i>
                                <span>View Progress</span>
                            </button>
                        </form>
                        
                        <hr class="my-4">
                        
                        <div class="text-center">
                            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                                <i data-feather="arrow-left" aria-hidden="true"></i>
                                <span>Back to Role Selection</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
